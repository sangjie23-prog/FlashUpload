server:
  port: 8080

spring:
  application:
    name: flash-upload-backend
  datasource:
    url: jdbc:mysql://localhost:3306/flash_upload?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

flash-upload:
  storage:
    path: storage/files

# 默认使用本地 H2 保证项目随时可启动，切换到 local 配置后可连接真实 MySQL。
